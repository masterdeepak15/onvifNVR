# ============================================================
# onvifNVR – Docker Compose (all data stored in .data/)
#
# Quick start:
#   docker compose up -d
#
# With SQL Server:
#   docker compose --profile sqlserver up -d
#
# Test streams (no real camera needed):
#   cam1 → rtsp://rtsp-test:8554/cam1   (colour bars + timestamp)
#   cam2 → rtsp://rtsp-test:8554/cam2   (moving test pattern)
#   cam3 → rtsp://rtsp-test:8554/cam3   (solid colour cycle)
# ============================================================

services:

  # ============================================================
  # SQL Server – only started when profile "sqlserver" is active
  # ============================================================
  sqlserver:
    profiles: [sqlserver]
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: nvr-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "${DB_PASSWORD:-NvrP@ss2024!}"
      MSSQL_PID: Express
    ports:
      - "1433:1433"
    volumes:
      - ./.data/sqlserver:/var/opt/mssql
    networks:
      - nvr-network
    healthcheck:
      test: >
        /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa
        -P "${DB_PASSWORD:-NvrP@ss2024!}" -Q "SELECT 1" -b -C
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped

  # ============================================================
  # RTSP Test Server (mediamtx)
  # Accepts streams published by the ffmpeg-* containers below
  # ============================================================
  rtsp-test:
    image: bluenviron/mediamtx:latest
    container_name: rtsp-test
    ports:
      - "8554:8554"    # RTSP
      - "8888:8888"    # HLS (optional browser preview)
    networks:
      - nvr-network
    restart: unless-stopped

  # ============================================================
  # FFmpeg test stream – cam1: SMPTE colour bars + live timestamp
  # ============================================================
  ffmpeg-cam1:
    image: linuxserver/ffmpeg:latest
    container_name: ffmpeg-cam1
    depends_on:
      - rtsp-test
    networks:
      - nvr-network
    restart: unless-stopped
    entrypoint: >
      /bin/sh -c "sleep 3 &&
      ffmpeg -re
      -f lavfi -i testsrc2=size=1280x720:rate=15
      -f lavfi -i sine=frequency=440:sample_rate=44100
      -vf \"drawtext=text='CAM1 %{localtime}':fontsize=36:fontcolor=white:x=10:y=10:box=1:boxcolor=black@0.5\"
      -c:v libx264 -preset ultrafast -tune zerolatency -pix_fmt yuv420p -g 30 -b:v 1500k
      -c:a aac -b:a 64k
      -f rtsp rtsp://rtsp-test:8554/cam1"

  # ============================================================
  # FFmpeg test stream – cam2: moving SMPTE pattern (different look)
  # ============================================================
  ffmpeg-cam2:
    image: linuxserver/ffmpeg:latest
    container_name: ffmpeg-cam2
    depends_on:
      - rtsp-test
    networks:
      - nvr-network
    restart: unless-stopped
    entrypoint: >
      /bin/sh -c "sleep 3 &&
      ffmpeg -re
      -f lavfi -i smptehdbars=size=1280x720:rate=15
      -f lavfi -i sine=frequency=880:sample_rate=44100
      -vf \"drawtext=text='CAM2 %{localtime}':fontsize=36:fontcolor=black:x=10:y=10:box=1:boxcolor=white@0.6\"
      -c:v libx264 -preset ultrafast -tune zerolatency -pix_fmt yuv420p -g 30 -b:v 1500k
      -c:a aac -b:a 64k
      -f rtsp rtsp://rtsp-test:8554/cam2"

  # ============================================================
  # FFmpeg test stream – cam3: solid colour cycle (simple/lightweight)
  # ============================================================
  ffmpeg-cam3:
    image: linuxserver/ffmpeg:latest
    container_name: ffmpeg-cam3
    depends_on:
      - rtsp-test
    networks:
      - nvr-network
    restart: unless-stopped
    entrypoint: >
      /bin/sh -c "sleep 3 &&
      ffmpeg -re
      -f lavfi -i \"color=c=blue:size=1280x720:rate=15\"
      -vf \"drawtext=text='CAM3 %{localtime}':fontsize=48:fontcolor=white:x=10:y=10\"
      -c:v libx264 -preset ultrafast -tune zerolatency -pix_fmt yuv420p -g 30 -b:v 800k
      -an
      -f rtsp rtsp://rtsp-test:8554/cam3"

  # ============================================================
  # NVR API Backend
  # ============================================================
  nvr-api:
    image: ghcr.io/${GITHUB_REPOSITORY:-masterdeepak15/onvifnvr}/nvr-api:${IMAGE_TAG:-latest}
    container_name: nvr-api
    ports:
      - "${API_PORT:-5050}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080

      # Database
      Database__Provider: "${DATABASE_PROVIDER:-SQLite}"
      ConnectionStrings__DefaultConnection: "${SQLITE_CONNECTION:-Data Source=/var/nvr/data/nvr.db}"
      ConnectionStrings__SqlServer: "Server=${DB_HOST:-sqlserver};Database=${DB_NAME:-NvrDb};User Id=${DB_USER:-sa};Password=${DB_PASSWORD:-NvrP@ss2024!};TrustServerCertificate=True;"

      # JWT – change secret before going to production!
      Jwt__Secret: "${JWT_SECRET:-NVR-SuperSecretKey-ChangeInProduction-AtLeast32Characters!}"
      Jwt__Issuer: "${JWT_ISSUER:-NVR.API}"
      Jwt__Audience: "${JWT_AUDIENCE:-NVR.Client}"
      Jwt__ExpiryHours: "${JWT_EXPIRY_HOURS:-1}"

      # CORS
      Cors__AllowedOrigins__0: "${CORS_ORIGIN_0:-http://localhost:3000}"
      Cors__AllowedOrigins__1: "${CORS_ORIGIN_1:-http://localhost:5050}"
      Cors__AllowedOrigins__2: "${CORS_ORIGIN_2:-}"

      # Recording / Storage
      Recording__TempDirectory: /tmp/nvr_chunks
      Recording__DefaultChunkDurationSeconds: "${CHUNK_DURATION_SECONDS:-60}"
      Recording__DefaultBitrateKbps: "${DEFAULT_BITRATE_KBPS:-2000}"
      Recording__HardwareAcceleration: "${HW_ACCEL:-none}"

      # Streaming
      Streaming__MaxConcurrentCameras: "${MAX_CAMERAS:-64}"
      Streaming__DefaultFps: "${DEFAULT_FPS:-15}"
      Streaming__DefaultWidth: "${DEFAULT_WIDTH:-1280}"
      Streaming__DefaultHeight: "${DEFAULT_HEIGHT:-720}"

    volumes:
      - ./.data/db:/var/nvr/data               # SQLite database file
      - ./.data/recordings:/var/nvr/recordings  # Recorded video files
      - ./.data/temp:/tmp/nvr_chunks            # Temporary FFmpeg chunks

    networks:
      - nvr-network
    depends_on:
      - rtsp-test
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ============================================================
  # React Frontend (nginx – also proxies /api/ and /hubs/ to backend)
  # ============================================================
  nvr-ui:
    image: ghcr.io/${GITHUB_REPOSITORY:-masterdeepak15/onvifnvr}/nvr-ui:${IMAGE_TAG:-latest}
    container_name: nvr-ui
    ports:
      - "${UI_PORT:-3000}:80"
    depends_on:
      nvr-api:
        condition: service_healthy
    networks:
      - nvr-network
    restart: unless-stopped

networks:
  nvr-network:
    driver: bridge
