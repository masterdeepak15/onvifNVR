# ============================================================
# onvifNVR – Docker Compose (all data stored in .data/)
#
# Quick start:
#   docker compose up -d
#
# With SQL Server:
#   docker compose --profile sqlserver up -d
# ============================================================

services:

  # ============================================================
  # SQL Server – only started when profile "sqlserver" is active
  # ============================================================
  sqlserver:
    profiles: [sqlserver]
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: nvr-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "${DB_PASSWORD:-NvrP@ss2024!}"
      MSSQL_PID: Express
    ports:
      - "1433:1433"
    volumes:
      - ./.data/sqlserver:/var/opt/mssql
    networks:
      - nvr-network
    healthcheck:
      test: >
        /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa
        -P "${DB_PASSWORD:-NvrP@ss2024!}" -Q "SELECT 1" -b -C
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped

  # ============================================================
  # NVR API Backend
  # ============================================================
  nvr-api:
    image: ghcr.io/${GITHUB_REPOSITORY:-masterdeepak15/onvifnvr}/nvr-api:${IMAGE_TAG:-latest}
    container_name: nvr-api
    ports:
      - "${API_PORT:-5050}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080

      # Database
      Database__Provider: "${DATABASE_PROVIDER:-SQLite}"
      ConnectionStrings__DefaultConnection: "${SQLITE_CONNECTION:-Data Source=/var/nvr/data/nvr.db}"
      ConnectionStrings__SqlServer: "Server=${DB_HOST:-sqlserver};Database=${DB_NAME:-NvrDb};User Id=${DB_USER:-sa};Password=${DB_PASSWORD:-NvrP@ss2024!};TrustServerCertificate=True;"

      # JWT – change secret before going to production!
      Jwt__Secret: "${JWT_SECRET:-NVR-SuperSecretKey-ChangeInProduction-AtLeast32Characters!}"
      Jwt__Issuer: "${JWT_ISSUER:-NVR.API}"
      Jwt__Audience: "${JWT_AUDIENCE:-NVR.Client}"
      Jwt__ExpiryHours: "${JWT_EXPIRY_HOURS:-1}"

      # CORS
      Cors__AllowedOrigins__0: "${CORS_ORIGIN_0:-http://localhost:3000}"
      Cors__AllowedOrigins__1: "${CORS_ORIGIN_1:-http://localhost:5050}"
      Cors__AllowedOrigins__2: "${CORS_ORIGIN_2:-}"

      # Recording / Storage
      Recording__TempDirectory: /tmp/nvr_chunks
      Recording__DefaultChunkDurationSeconds: "${CHUNK_DURATION_SECONDS:-60}"
      Recording__DefaultBitrateKbps: "${DEFAULT_BITRATE_KBPS:-2000}"
      Recording__HardwareAcceleration: "${HW_ACCEL:-none}"

      # Streaming
      Streaming__MaxConcurrentCameras: "${MAX_CAMERAS:-64}"
      Streaming__DefaultFps: "${DEFAULT_FPS:-15}"
      Streaming__DefaultWidth: "${DEFAULT_WIDTH:-1280}"
      Streaming__DefaultHeight: "${DEFAULT_HEIGHT:-720}"

    volumes:
      - ./.data/db:/var/nvr/data               # SQLite database file
      - ./.data/recordings:/var/nvr/recordings  # Recorded video files
      - ./.data/temp:/tmp/nvr_chunks            # Temporary FFmpeg chunks

    networks:
      - nvr-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ============================================================
  # React Frontend (nginx – also proxies /api/ and /hubs/ to backend)
  # ============================================================
  nvr-ui:
    image: ghcr.io/${GITHUB_REPOSITORY:-masterdeepak15/onvifnvr}/nvr-ui:${IMAGE_TAG:-latest}
    container_name: nvr-ui
    ports:
      - "${UI_PORT:-3000}:80"
    depends_on:
      nvr-api:
        condition: service_healthy
    networks:
      - nvr-network
    restart: unless-stopped

networks:
  nvr-network:
    driver: bridge
