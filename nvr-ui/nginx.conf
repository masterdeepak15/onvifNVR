server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/x-javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_vary on;

    # React SPA routing — all unmatched paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # REST API proxy → nvr-api backend
    location /api/ {
        proxy_pass http://nvr-api:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 60s;
    }

    # SignalR WebSocket proxy → nvr-api backend
    location /hubs/ {
        proxy_pass http://nvr-api:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400s;  # Keep WebSocket alive for up to 24h
    }

    # Recording playback streaming (long-lived, no buffering)
    location /api/recordings/ {
        proxy_pass http://nvr-api:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        send_timeout 3600s;
    }

    # Health check passthrough
    location /health {
        proxy_pass http://nvr-api:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
