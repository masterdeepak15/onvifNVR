server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    # React SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxy
    location /api/ {
        proxy_pass http://nvr-api:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 60s;
    }

    # SignalR WebSocket proxy
    location /hubs/ {
        proxy_pass http://nvr-api:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400s; # Keep WebSocket open
    }

    # MPEG-TS video streaming (recording playback)
    location /api/recordings/ {
        proxy_pass http://nvr-api:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_buffering off;        # Disable buffering for streaming
        proxy_cache off;
        proxy_read_timeout 3600s;   # 1 hour timeout for long recordings
        send_timeout 3600s;
    }
}
